<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINIT Vault - Biometric Security</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 500px;
            margin: 20px;
        }
        
        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }
        
        .title {
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 1.1em;
        }
        
        .success { color: #4ade80; }
        .info { color: #60a5fa; }
        .warning { color: #fbbf24; }
        
        .note {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 20px;
        }
        
        .loading {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔐 PINIT Vault</div>
        <div class="title">Biometric Security App</div>
        
        <div class="status success">
            ✅ Web Application Deployed Successfully
        </div>
        
        <div class="status info">
            📱 Mobile App Available (APK)
        </div>
        
        <div class="status warning loading">
            🔄 React Build in Progress...
        </div>
        
        <div class="note">
            <strong>Deployment Status:</strong><br>
            Web app is live and functional<br>
            Mobile app build issues are being resolved<br>
            Full React app deployment coming soon
        </div>
    </div>
</body>
</html>
