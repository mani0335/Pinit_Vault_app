services:
  # FastAPI Backend Service (Python)
  - type: web
    name: biovault-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        scope: env
        value: https://wdvsfjpkxfjaelrydgqd.supabase.co
      - key: SUPABASE_SERVICE_KEY
        scope: env
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkdnNmanBreGZqYWVscnlkZ3FkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTczNDExMDc3NCwiZXhwIjoxODYwNjg2Nzc0fQ.K2n1mAE2Rkzb9MjvYy-H9Zz7q1Q3X4vA5B8c9D0j1Kk
      - key: SUPABASE_KEY
        scope: env
        value: sb_publishable_wdvsfjpkxfjaelrydgqd
      - key: JWT_SECRET
        scope: env
        value: your-secret-key-here-change-in-production
      - key: JWT_EXPIRE_MINUTES
        scope: env
        value: "1440"
      - key: CLOUDINARY_CLOUD_NAME
        scope: env
        value: dvecx1ujt
      - key: CLOUDINARY_API_KEY
        scope: env
        value: 794893429619753
      - key: CLOUDINARY_API_SECRET
        scope: env
        value: esRn6lVD65x2z6Jy5FmKVUGfGYA
      - key: CLOUDINARY_FOLDER
        scope: env
        value: pinit-thumbnails

  # Backend API Service (Old Node)
  - type: web
    name: biovault-app
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: MONGODB_URI
        scope: build
        value: mongodb+srv://manish:Manish%401614@cluster0.jwchpax.mongodb.net/biovault?appName=Cluster0&retryWrites=true&w=majority
      - key: MONGODB_DB
        scope: build
        value: biovault
      - key: JWT_SECRET
        scope: build
        value: biovault-secret-key-production
      - key: NODE_ENV
        scope: build
        value: production
      - key: PORT
        scope: build
        value: "3333"

  # Frontend Static Site
  - type: static_site
    name: biovault-web
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - path: /api/*
        destination: https://biovault-app.onrender.com/api/:path
    headers:
      - path: "/*"
        name: "Cache-Control"
        value: "no-cache"
